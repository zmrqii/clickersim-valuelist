<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pro Value List</title>

<style>
body{
margin:0;
font-family:Arial;
background:#050816;
color:white;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 8%;
background:#0f172a;
position:sticky;
top:0;
border-bottom:1px solid rgba(255,255,255,0.1);
}

.logo{
color:#a78bfa;
font-weight:bold;
}

/* CONTROLS */
.controls{
padding:20px 8%;
display:flex;
flex-wrap:wrap;
gap:10px;
align-items:center;
}

input,select{
padding:10px;
border-radius:8px;
border:none;
outline:none;
background:#111827;
color:white;
}

/* FILTER BUTTONS */
.filterBtn{
padding:8px 14px;
border-radius:20px;
border:none;
cursor:pointer;
background:#1f2937;
color:white;
transition:0.2s;
}

.filterBtn.active{
background:#7c3aed;
transform:scale(1.05);
}

/* TABLE */
table{
width:84%;
margin:0 8%;
border-collapse:collapse;
background:#0f172a;
border-radius:10px;
overflow:hidden;
}

th,td{
padding:12px;
border-bottom:1px solid rgba(255,255,255,0.08);
text-align:left;
}

th{
background:#111827;
color:#a78bfa;
cursor:pointer;
}

tr:hover{
background:rgba(255,255,255,0.05);
cursor:pointer;
}

/* BADGES */
.badge{
padding:4px 10px;
border-radius:12px;
font-size:12px;
}

.secret{background:#7c3aed;}
.mythical{background:#f59e0b;}
.exclusive{background:#ef4444;}
.event{background:#22c55e;}

/* ADMIN */
#adminPanel{
display:none;
position:fixed;
top:0;
right:0;
width:320px;
height:100%;
background:#0b1220;
padding:20px;
border-left:2px solid #7c3aed;
overflow:auto;
}

.btn{
background:#7c3aed;
border:none;
color:white;
padding:10px;
width:100%;
border-radius:6px;
margin-top:10px;
}

.editBtn{background:#22c55e;border:none;padding:5px;color:white;border-radius:5px;}
.deleteBtn{background:#ef4444;border:none;padding:5px;color:white;border-radius:5px;}
</style>
</head>

<body>

<header>
<div class="logo">⚡ Pro Value List</div>
<button onclick="openLogin()">Login</button>
</header>

<!-- CONTROLS -->
<div class="controls">

<input id="search" placeholder="Search pets..." onkeyup="render()"/>

<select id="sort" onchange="render()">
<option value="az">Sort: A → Z</option>
<option value="za">Sort: Z → A</option>
</select>

<button class="filterBtn active" onclick="setFilter('all',event)">All</button>
<button class="filterBtn" onclick="setFilter('Secret',event)">Secrets</button>
<button class="filterBtn" onclick="setFilter('Mythical',event)">Mythicals</button>
<button class="filterBtn" onclick="setFilter('Exclusive',event)">Exclusives</button>
<button class="filterBtn" onclick="setFilter('Event',event)">Events</button>

</div>

<table>
<thead>
<tr>
<th>Pet</th>
<th>Value</th>
<th>Demand</th>
<th>Rarity</th>
<th>Action</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<!-- ADMIN -->
<div id="adminPanel">
<h3>Admin Panel</h3>

<input id="name" placeholder="Pet Name"/>
<input id="value" placeholder="Value"/>
<input id="demand" placeholder="Demand"/>
<input id="rarity" placeholder="Rarity"/>

<button class="btn" onclick="addPet()">Add / Update</button>
<button class="btn" onclick="logout()">Logout</button>
</div>

<script>

let data = JSON.parse(localStorage.getItem("pets")) || [
{name:"Celestial Dragon",value:"500B",demand:"High",rarity:"Secret"},
{name:"Infernal Cat",value:"250B",demand:"Medium",rarity:"Event"},
{name:"Galaxy Phoenix",value:"1.2T",demand:"Very High",rarity:"Mythical"},
{name:"Void Serpent",value:"800B",demand:"High",rarity:"Secret"}
];

let filter = "all";

/* FILTER */
function setFilter(type, e){
filter = type;
document.querySelectorAll(".filterBtn").forEach(b=>b.classList.remove("active"));
e.target.classList.add("active");
render();
}

/* SAVE */
function save(){
localStorage.setItem("pets",JSON.stringify(data));
}

/* RENDER */
function render(){

let search=document.getElementById("search").value.toLowerCase();
let sort=document.getElementById("sort").value;

let list = [...data];

if(sort==="az") list.sort((a,b)=>a.name.localeCompare(b.name));
if(sort==="za") list.sort((a,b)=>b.name.localeCompare(a.name));

list = list.filter(p=>{
return (filter==="all" || p.rarity===filter) &&
p.name.toLowerCase().includes(search);
});

let tbody=document.getElementById("tableBody");
tbody.innerHTML="";

list.forEach((p,i)=>{

tbody.innerHTML+=`
<tr onclick="selectPet(${i})">
<td>${p.name}</td>
<td>${p.value}</td>
<td>${p.demand}</td>
<td><span class="badge ${p.rarity.toLowerCase()}">${p.rarity}</span></td>
<td>
<button class="editBtn" onclick="event.stopPropagation(); editPet(${i})">Edit</button>
<button class="deleteBtn" onclick="event.stopPropagation(); deletePet(${i})">X</button>
</td>
</tr>
`;
});
}

/* SELECT */
window.selectPet=function(i){
let p=data[i];
name.value=p.name;
value.value=p.value;
demand.value=p.demand;
rarity.value=p.rarity;
}

/* ADD */
window.addPet=function(){
let n=name.value;
let v=value.value;
let d=demand.value;
let r=rarity.value;

let found=data.find(p=>p.name===n);

if(found){
found.value=v;
found.demand=d;
found.rarity=r;
}else{
data.push({name:n,value:v,demand:d,rarity:r});
}

save();
render();
}

/* EDIT */
window.editPet=function(i){
let p=data[i];
name.value=p.name;
value.value=p.value;
demand.value=p.demand;
rarity.value=p.rarity;
}

/* DELETE */
window.deletePet=function(i){
data.splice(i,1);
save();
render();
}

/* ADMIN SIMPLE LOGIN (no roles) */
window.openLogin=function(){
document.getElementById("adminPanel").style.display="block";
}

window.logout=function(){
document.getElementById("adminPanel").style.display="none";
}

render();

</script>

</body>
</html>
