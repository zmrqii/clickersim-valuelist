<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Clicker Value List</title>

<style>

color:white;
}

display:flex;

padding:15px 8%;

top:0;
z-index:10;
}

.logo{color:#c084fc;font-weight:bold;}

button{

padding:10px 14px;

}

#menu{
display:none;
position:absolute;

}

#menu button{
width:100%;
padding:10px;
background:none;
border:none;
color:white;
text-align:left;
}

section{padding:20px 8%;}

#adminPanel{
display:none;
position:fixed;
top:0;
right:0;
width:320px;
height:100%;
background:#0f172a;
padding:20px;
border-left:2px solid #c084fc;

z-index:100;
}

input, select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:none;
background:#111827;
color:white;
}

table{
width:100%;
margin-top:20px;

}

th,td{
padding:10px;
border-bottom:1px solid rgba(255,255,255,0.1);
}
th{color:#c084fc;background:#0f172a;}

.delete-btn{

padding:5px 10px;
font-size:12px;
border-radius:4px;
}
.delete-btn:hover{background:#ef4444;}

.loading{color:#8b5cf6;text-align:center;padding:20px;}

#searchBar{
width:100%;
padding:12px 16px;
border-radius:8px;
border:1px solid rgba(255,255,255,0.1);
background:#111827;
color:white;
font-size:14px;
outline:none;
margin-top:0;
}
#searchBar:focus{border-color:#7c3aed;}
#searchBar::placeholder{color:#6b7280;}
.no-results{color:#6b7280;text-align:center;padding:20px;}

.name-wrap{position:relative;}
#nameSuggestions{
position:absolute;
top:100%;
left:0;
right:0;
background:#1e293b;
border:1px solid #30363d;
border-radius:0 0 6px 6px;
max-height:160px;
overflow-y:auto;
z-index:200;
display:none;
}
#nameSuggestions div{
padding:8px 12px;
cursor:pointer;
font-size:13px;
}
#nameSuggestions div:hover{background:#334155;}

.seed-btn{
background:#0d9488;
margin-top:10px;
font-size:11px;
padding:8px 12px;
}
.seed-btn:hover{background:#14b8a6;}
</style>
</head>

<body>

<header>
<div class="logo">🐾 Value List</div>

<div style="display:flex;align-items:center;gap:10px;flex:1;margin:0 20px;">
<div style="position:relative;">
<button onclick="toggleMenu()">Menu ▼</button>
<div id="menu">
<button onclick="goPage('home')">Home</button>
<button onclick="goPage('Basic')">Basic</button>
<button onclick="goPage('Rare')">Rare</button>
<button onclick="goPage('Epic')">Epic</button>
<button onclick="goPage('Legendary')">Legendary</button>
<button onclick="goPage('Mythic')">Mythic</button>
<button onclick="goPage('Mythical')">Mythical</button>
<button onclick="goPage('Special')">Special</button>
<button onclick="goPage('Secret')">Secret</button>
<button onclick="goPage('Mega')">Mega</button>
<button onclick="goPage('Exclusive')">Exclusive</button>
</div>
</div>
<input type="text" id="headerSearch" placeholder="Search pets..." style="width:200px;margin:0;">
</div>

<button onclick="openAdmin()">Admin</button>
</header>

<section id="homePage">
<h2>Clicker Sim Value List</h2>
<p>Official value list for trading.</p>
</section>

<section id="searchPage" style="display:none;">
<input type="text" id="searchBar" placeholder="Search pets...">
<table id="searchTable" style="display:none;margin-top:10px;">
<thead>
<tr>
<th>Pet</th>
<th>Normal</th>
<th>Golden</th>
<th>Rainbow</th>
<th>Rarity</th>
</tr>
</thead>
<tbody id="searchBody"></tbody>
</table>
<p class="no-results" id="noResults" style="display:none;">No pets found.</p>
</section>

<section id="listPage" style="display:none;">
<p class="loading" id="loadingMsg">Loading pets...</p>
<table id="petTable" style="display:none;">
<thead>
<tr>
<th>Pet</th>
<th>Normal</th>
<th>Golden</th>
<th>Rainbow</th>
<th>Rarity</th>
<th id="deleteCol" style="display:none;">Action</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</section>

<div id="adminPanel">

<h3>Admin Login</h3>

<input id="email" placeholder="Email"/>
<input id="password" type="password" placeholder="Password"/>

<button onclick="login()">Login</button>

<hr/>

<div id="adminTools" style="display:none;">

<div class="name-wrap">
<input id="name" placeholder="Pet Name" autocomplete="off"/>
<div id="nameSuggestions"></div>
</div>
<input id="normal" placeholder="Normal Value"/>
<input id="golden" placeholder="Golden Value"/>
<input id="rainbow" placeholder="Rainbow Value"/>

<select id="rarity">
<option value="Basic">Basic</option>
<option value="Rare">Rare</option>
<option value="Epic">Epic</option>
<option value="Legendary">Legendary</option>
<option value="Mythic">Mythic</option>
<option value="Mythical">Mythical</option>
<option value="Special">Special</option>
<option value="Secret">Secret</option>
<option value="Mega">Mega</option>
<option value="Exclusive">Exclusive</option>
</select>

<button onclick="addPet()">Add / Update</button>
<button onclick="seedPets()" class="seed-btn">Seed All Pets (184)</button>
<button onclick="logout()" style="background:#dc2626;margin-top:10px;">Logout</button>

</div>

<br>
<button onclick="closeAdmin()">Close</button>
</div>

<script type="module">

doc,

/* FIREBASE */
const firebaseConfig = {

const auth = getAuth(app);
const db = getFirestore(app);

/* ALL 184 PETS */
const ALL_PETS = [
{name:"Fish",rarity:"Basic"},{name:"Purple Jellyfish",rarity:"Basic"},{name:"Summer Cat",rarity:"Basic"},{name:"Summer Dog",rarity:"Basic"},{name:"Nebula Wyvern",rarity:"Basic"},{name:"Seraph",rarity:"Basic"},{name:"Starling Sprite",rarity:"Basic"},{name:"Supernova",rarity:"Basic"},{name:"Cat",rarity:"Basic"},{name:"Dog",rarity:"Basic"},{name:"Bunny",rarity:"Basic"},{name:"Chicken",rarity:"Basic"},{name:"Black Dominus",rarity:"Basic"},{name:"Blue Block",rarity:"Basic"},{name:"Blue Dominus",rarity:"Basic"},{name:"Blue Dragon",rarity:"Basic"},{name:"Blue Wizard",rarity:"Basic"},{name:"Chest",rarity:"Basic"},{name:"Green Block",rarity:"Basic"},{name:"Green Dragon",rarity:"Basic"},{name:"Green Wizard",rarity:"Basic"},{name:"Magma",rarity:"Basic"},{name:"Orange Block",rarity:"Basic"},{name:"Orange Dominus",rarity:"Basic"},{name:"Orange Wizard",rarity:"Basic"},{name:"Panda",rarity:"Basic"},{name:"Pink Dragon",rarity:"Basic"},{name:"Police",rarity:"Basic"},{name:"Potion",rarity:"Basic"},{name:"Pumpkin",rarity:"Basic"},{name:"Purple Block",rarity:"Basic"},{name:"Purple Wizard",rarity:"Basic"},{name:"Red Block",rarity:"Basic"},{name:"Red Dominus",rarity:"Basic"},{name:"Red Dragon",rarity:"Basic"},{name:"Red Wizard",rarity:"Basic"},{name:"Robot",rarity:"Basic"},{name:"White Dominus",rarity:"Basic"},{name:"Yellow Dragon",rarity:"Basic"},{name:"Zombie",rarity:"Basic"},{name:"Black Cat",rarity:"Basic"},{name:"Calf",rarity:"Basic"},{name:"Squirrel",rarity:"Basic"},{name:"Wolf",rarity:"Basic"},{name:"Seal",rarity:"Basic"},{name:"Goat",rarity:"Basic"},{name:"Cosmic Crawler",rarity:"Basic"},{name:"Mouse",rarity:"Basic"},{name:"Giraffe",rarity:"Basic"},{name:"Zebra",rarity:"Basic"},{name:"Cupcake",rarity:"Basic"},{name:"Chocolate",rarity:"Basic"},{name:"Turtle",rarity:"Basic"},{name:"Slime",rarity:"Basic"},{name:"Snake",rarity:"Basic"},{name:"Reversed Cat",rarity:"Basic"},{name:"Overseer",rarity:"Basic"},
{name:"Blue Jellyfish",rarity:"Rare"},{name:"Pink Bunny",rarity:"Rare"},{name:"Pig",rarity:"Rare"},{name:"Cow",rarity:"Rare"},{name:"Bear",rarity:"Rare"},{name:"Raccoon",rarity:"Rare"},{name:"Penguin",rarity:"Rare"},{name:"Polar Bear",rarity:"Rare"},{name:"Spider",rarity:"Rare"},{name:"Monkey",rarity:"Rare"},{name:"Camel",rarity:"Rare"},{name:"Fox",rarity:"Rare"},{name:"Candy",rarity:"Rare"},{name:"Cookieman",rarity:"Rare"},{name:"Black Bear",rarity:"Rare"},{name:"Gold Fish",rarity:"Rare"},{name:"Shark",rarity:"Rare"},{name:"Red Hydominus",rarity:"Rare"},{name:"Red Gift",rarity:"Rare"},{name:"Tanuki",rarity:"Rare"},{name:"Blue Gift",rarity:"Rare"},{name:"Magma Cube",rarity:"Rare"},{name:"Molten Slime",rarity:"Rare"},{name:"Reversed Dog",rarity:"Rare"},{name:"Red Balloon",rarity:"Rare"},{name:"Holy Egg",rarity:"Rare"},{name:"Blue Balloon",rarity:"Rare"},
{name:"Crab",rarity:"Epic"},{name:"Bee",rarity:"Epic"},{name:"Owl",rarity:"Epic"},{name:"Skier",rarity:"Epic"},{name:"Yeti",rarity:"Epic"},{name:"Tiger",rarity:"Epic"},{name:"Bull",rarity:"Epic"},{name:"Cheetah",rarity:"Epic"},{name:"Ice Cream",rarity:"Epic"},{name:"Strawberry",rarity:"Epic"},{name:"Unicorn",rarity:"Epic"},{name:"Duck",rarity:"Epic"},{name:"Frog",rarity:"Epic"},{name:"Orange Hydominus",rarity:"Epic"},{name:"Sakura Turtle",rarity:"Epic"},{name:"Tiny Firecracker",rarity:"Epic"},{name:"Hellfire Bat",rarity:"Epic"},{name:"Disco Ball",rarity:"Epic"},{name:"Aurelite Halo",rarity:"Epic"},{name:"Shattered Shard",rarity:"Epic"},{name:"Yellow Seahorse",rarity:"Epic"},{name:"Red Seahorse",rarity:"Epic"},
{name:"Pufferfish",rarity:"Legendary"},{name:"Deer",rarity:"Legendary"},{name:"Snowman",rarity:"Legendary"},{name:"Gorilla",rarity:"Legendary"},{name:"Lion",rarity:"Legendary"},{name:"Bubble Gum",rarity:"Legendary"},{name:"Candy Gun",rarity:"Legendary"},{name:"Swimmer",rarity:"Legendary"},{name:"Blue Hydominus",rarity:"Legendary"},{name:"Black Hydominus",rarity:"Legendary"},{name:"Lotus Serpent",rarity:"Legendary"},{name:"Chest Mimic",rarity:"Legendary"},{name:"Pet Stack",rarity:"Legendary"},{name:"Party Cogmower",rarity:"Legendary"},{name:"Cherubis Bloom",rarity:"Legendary"},{name:"Clicker Tetra Cube",rarity:"Legendary"},{name:"Shell",rarity:"Legendary"},
{name:"Elephant",rarity:"Mythical"},{name:"Cactus",rarity:"Mythical"},{name:"Cowboy",rarity:"Mythical"},{name:"Candy Dominus",rarity:"Mythical"},{name:"Star Fish",rarity:"Mythical"},{name:"Kraken",rarity:"Mythical"},{name:"White Hydominus",rarity:"Mythical"},{name:"Phoenix",rarity:"Mythical"},{name:"The Overlord",rarity:"Mythical"},{name:"500K Overlord",rarity:"Mythical"},{name:"Boombox",rarity:"Mythical"},{name:"Shard",rarity:"Mythical"},{name:"1M Star",rarity:"Mythical"},{name:"Starforge",rarity:"Mythical"},{name:"Poly",rarity:"Mythical"},
{name:"Acorn",rarity:"Secret"},{name:"Chocolate Ice Cream",rarity:"Secret"},{name:"Sea Serpent",rarity:"Secret"},{name:"Poseidon",rarity:"Secret"},{name:"Abyss",rarity:"Secret"},{name:"Petal Moth",rarity:"Secret"},{name:"Cataclysm Dragon",rarity:"Secret"},{name:"Kitsune",rarity:"Secret"},{name:"Diamond",rarity:"Secret"},{name:"Hellwing",rarity:"Secret"},{name:"Ember Champion",rarity:"Secret"},{name:"Core Guardian",rarity:"Secret"},{name:"Equalizer",rarity:"Secret"},{name:"Firecrackers",rarity:"Secret"},{name:"Giant Holy Egg",rarity:"Secret"},{name:"The Clicker Trophy",rarity:"Secret"},{name:"1M Click",rarity:"Secret"},{name:"Godly Gem",rarity:"Secret"},{name:"1M Rebirth",rarity:"Secret"},{name:"Ophanim",rarity:"Secret"},{name:"Cat In A Bucket",rarity:"Secret"},{name:"Chest Mimic In A Bucket",rarity:"Secret"},{name:"Dog In A Bucket",rarity:"Secret"},{name:"Turtle In A Bucket",rarity:"Secret"},{name:"Apex",rarity:"Secret"},
{name:"Vault Keeper",rarity:"Special"},{name:"Midas",rarity:"Special"},{name:"Eternal Star",rarity:"Special"},{name:"Crimson Star",rarity:"Special"},{name:"Eternal Shard",rarity:"Special"},{name:"Crimson Shard",rarity:"Special"},{name:"Eternal Trophy",rarity:"Special"},{name:"Crimson Trophy",rarity:"Special"},
{name:"Astronaut",rarity:"Exclusive"},{name:"Earth",rarity:"Exclusive"},{name:"Rocket",rarity:"Exclusive"},{name:"Angel",rarity:"Exclusive"},{name:"Angel & Devil",rarity:"Exclusive"},{name:"Alien",rarity:"Exclusive"},{name:"UFO",rarity:"Exclusive"},{name:"Embercrest",rarity:"Exclusive"},{name:"Solflare",rarity:"Exclusive"},{name:"All Seeing Guardian",rarity:"Exclusive"},{name:"Frozen Eye Cube",rarity:"Exclusive"},{name:"Royal Trophy",rarity:"Exclusive"},
{name:"Ktulhu",rarity:"Mega"}
];

/* STATE */
window.data = [];
window.isAdmin = false;
window.page = "home";

/* SAFETY CATCH */
window.addEventListener("error", e => {
console.log("JS ERROR:", e.message);
});

/* XSS PROTECTION */
function esc(str) {
const d = document.createElement("div");
d.textContent = String(str);
return d.innerHTML;
}

/* LOAD PETS FROM FIRESTORE */
async function loadPets() {
try {
const snap = await getDocs(collection(db, "pets"));
window.data = [];
snap.forEach(d => {
window.data.push({ id: d.id, ...d.data() });
});
document.getElementById("loadingMsg").style.display = "none";
document.getElementById("petTable").style.display = "table";
render(window.page);
} catch (err) {
console.log("Firestore load error:", err.message);
document.getElementById("loadingMsg").textContent = "Failed to load pets.";
}
}

/* SEED ALL PETS */
window.seedPets = async function() {
if (!window.isAdmin) { alert("Not admin"); return; }
if (!confirm("Seed all 184 pets with '?' values? Existing pets will NOT be overwritten.")) return;

const existing = new Set(window.data.map(p => p.name.toLowerCase().replace(/[^a-z0-9]/g, "_")));
let added = 0;

// Firestore batch max is 500, we have 184 so one batch is fine
const batch = writeBatch(db);
for (const pet of ALL_PETS) {
const docId = pet.name.toLowerCase().replace(/[^a-z0-9]/g, "_");
if (existing.has(docId)) continue;
batch.set(doc(db, "pets", docId), {
name: pet.name, rarity: pet.rarity, normal: "?", golden: "?", rainbow: "?"
});
added++;
}

if (added === 0) { alert("All pets already exist."); return; }

try {
await batch.commit();
await loadPets();
alert("Seeded " + added + " pets!");
} catch (err) {
alert("Seed failed: " + err.message);
}
};

/* MENU */
window.toggleMenu = function(){
const m = document.getElementById("menu");
if(!m) return;
m.style.display = m.style.display === "block" ? "none" : "block";
};

window.goPage = function(page){
window.page = page;
document.getElementById("menu").style.display = "none";
document.getElementById("homePage").style.display = page === "home" ? "block" : "none";
document.getElementById("searchPage").style.display = page === "search" ? "block" : "none";
document.getElementById("listPage").style.display = (page !== "home" && page !== "search") ? "block" : "none";
if (page === "search") {
document.getElementById("searchBar").value = "";
renderSearch("");
document.getElementById("searchBar").focus();
} else if (page !== "home") {
render(page);
}
};

/* RENDER */
function render(page){
const tbody = document.getElementById("tableBody");
if(!tbody) return;

tbody.innerHTML = "";

const deleteCol = document.getElementById("deleteCol");
if (deleteCol) deleteCol.style.display = window.isAdmin ? "table-cell" : "none";

window.data
.filter(p => p.rarity === page)
.forEach(p => {
const tr = document.createElement("tr");
tr.innerHTML =
`<td>${esc(p.name)}</td>` +
`<td>${esc(p.normal)}</td>` +
`<td>${esc(p.golden)}</td>` +
`<td>${esc(p.rainbow)}</td>` +
`<td>${esc(p.rarity)}</td>` +
(window.isAdmin ? `<td><button class="delete-btn" data-id="${esc(p.id)}">Delete</button></td>` : "");
tbody.appendChild(tr);
});

tbody.querySelectorAll(".delete-btn").forEach(btn => {
btn.addEventListener("click", () => deletePet(btn.dataset.id));
});
}

/* ADD / UPDATE PET — SAVES TO FIRESTORE */
window.addPet = async function(){
if(!window.isAdmin){
alert("Not admin");
return;
}

const n = document.getElementById("name").value.trim();
const no = document.getElementById("normal").value.trim();
const g = document.getElementById("golden").value.trim();
const r = document.getElementById("rainbow").value.trim();
const ra = document.getElementById("rarity").value;

if(!n || !no){
alert("Fill required fields");
return;
}

const petData = { name: n, normal: no, golden: g, rainbow: r, rarity: ra };
const docId = n.toLowerCase().replace(/[^a-z0-9]/g, "_");

try {
await setDoc(doc(db, "pets", docId), petData);
await loadPets();
document.getElementById("name").value = "";
document.getElementById("normal").value = "";
document.getElementById("golden").value = "";
document.getElementById("rainbow").value = "";
alert("Saved!");
} catch (err) {
alert("Save failed: " + err.message);
}
};

/* DELETE PET */
async function deletePet(id) {
if (!window.isAdmin) return;
if (!confirm("Delete this pet?")) return;
try {
await deleteDoc(doc(db, "pets", id));
await loadPets();
} catch (err) {
alert("Delete failed: " + err.message);
}
}

/* NAME AUTOCOMPLETE */
const nameInput = document.getElementById("name");
const suggestions = document.getElementById("nameSuggestions");

nameInput.addEventListener("input", () => {
const q = nameInput.value.trim().toLowerCase();
suggestions.innerHTML = "";
if (!q) { suggestions.style.display = "none"; return; }

const matches = window.data.filter(p => p.name.toLowerCase().includes(q)).slice(0, 8);
if (!matches.length) { suggestions.style.display = "none"; return; }

suggestions.style.display = "block";
matches.forEach(p => {
const div = document.createElement("div");
div.textContent = p.name + " (" + p.rarity + ")";
div.addEventListener("click", () => {
nameInput.value = p.name;
document.getElementById("normal").value = p.normal || "";
document.getElementById("golden").value = p.golden || "";
document.getElementById("rainbow").value = p.rainbow || "";
document.getElementById("rarity").value = p.rarity || "Basic";
suggestions.style.display = "none";
});
suggestions.appendChild(div);
});
});

nameInput.addEventListener("blur", () => {
setTimeout(() => { suggestions.style.display = "none"; }, 150);
});

/* LOGIN */
window.login = function(){
const e = document.getElementById("email").value;
const p = document.getElementById("password").value;
signInWithEmailAndPassword(auth, e, p)
.then(() => {
document.getElementById("email").value = "";
document.getElementById("password").value = "";
})
.catch(err => alert(err.message));
};

/* LOGOUT */
window.logout = function(){
signOut(auth).catch(err => alert(err.message));
};

/* ADMIN CHECK */
onAuthStateChanged(auth, (user) => {
window.isAdmin = !!user;
document.getElementById("adminTools").style.display = user ? "block" : "none";
render(window.page);
});

/* ADMIN UI */
window.openAdmin = function(){
document.getElementById("adminPanel").style.display = "block";
};

window.closeAdmin = function(){
document.getElementById("adminPanel").style.display = "none";
};

/* SEARCH */
function renderSearch(query) {
const tbody = document.getElementById("searchBody");
const table = document.getElementById("searchTable");
const noResults = document.getElementById("noResults");
if (!tbody) return;

tbody.innerHTML = "";
const q = query.toLowerCase();
const matches = q ? window.data.filter(p => p.name.toLowerCase().includes(q)) : [];

if (!q) {
table.style.display = "none";
noResults.style.display = "none";
return;
}

if (matches.length === 0) {
table.style.display = "none";
noResults.style.display = "block";
return;
}

noResults.style.display = "none";
table.style.display = "table";

matches.forEach(p => {
const tr = document.createElement("tr");
tr.innerHTML =
`<td>${esc(p.name)}</td>` +
`<td>${esc(p.normal)}</td>` +
`<td>${esc(p.golden)}</td>` +
`<td>${esc(p.rainbow)}</td>` +
`<td>${esc(p.rarity)}</td>`;
tbody.appendChild(tr);
});
}

document.getElementById("searchBar").addEventListener("input", (e) => {
renderSearch(e.target.value);
document.getElementById("headerSearch").value = e.target.value;
});

document.getElementById("headerSearch").addEventListener("input", (e) => {
const q = e.target.value;
if (window.page !== "search") {
window.page = "search";
document.getElementById("homePage").style.display = "none";
document.getElementById("listPage").style.display = "none";
document.getElementById("searchPage").style.display = "block";
}
document.getElementById("searchBar").value = q;
renderSearch(q);
});

/* CLOSE MENU ON OUTSIDE CLICK */
document.addEventListener("click", (e) => {
const menu = document.getElementById("menu");
if (!e.target.closest("#menu") && !e.target.closest("[onclick*='toggleMenu']")) {
menu.style.display = "none";
}
});

/* START */
goPage("home");
loadPets();

</script>

</body>
</html>
