<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Clicker Value List</title>

<style>
body{
margin:0;
font-family:Arial;
background:#070a18;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 8%;
background:#111827;
position:sticky;
top:0;
}

.logo{color:#c084fc;font-weight:bold;}

button{
background:#7c3aed;
color:white;
border:none;
padding:10px 14px;
border-radius:8px;
cursor:pointer;
}

#menu{
display:none;
position:absolute;
right:0;
top:45px;
background:#111827;
border:1px solid rgba(255,255,255,0.1);
border-radius:10px;
overflow:hidden;
z-index:999;
min-width:150px;
}

#menu button{
width:100%;
padding:10px;
background:none;
border:none;
color:white;
text-align:left;
}

section{padding:20px 8%;}

#adminPanel{
display:none;
position:fixed;
top:0;
right:0;
width:320px;
height:100%;
background:#0f172a;
padding:20px;
border-left:2px solid #c084fc;
overflow:auto;
}

input, select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:none;
background:#111827;
color:white;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
background:#111827;
}

th,td{
padding:10px;
border-bottom:1px solid rgba(255,255,255,0.1);
}
th{color:#c084fc;background:#0f172a;}
</style>
</head>

<body>

<header>
<div class="logo">🐾 Value List</div>

<div style="position:relative;">
<button onclick="toggleMenu()">Menu ▼</button>
<div id="menu">
<button onclick="goPage('home')">Home</button>
<button onclick="goPage('Secret')">Secrets</button>
<button onclick="goPage('Mythical')">Mythicals</button>
</div>
</div>

<button onclick="openAdmin()">Admin</button>
</header>

<section id="homePage">
<h2>Clicker Sim Value List</h2>
<p>Official value list for trading.</p>
</section>

<section id="listPage" style="display:none;">
<table>
<thead>
<tr>
<th>Pet</th>
<th>Normal</th>
<th>Golden</th>
<th>Rainbow</th>
<th>Rarity</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</section>

<div id="adminPanel">

<h3>Admin Login</h3>

<input id="email" placeholder="Email"/>
<input id="password" type="password" placeholder="Password"/>

<button onclick="login()">Login</button>

<hr/>

<div id="adminTools" style="display:none;">

<input id="name" placeholder="Pet Name"/>
<input id="normal" placeholder="Normal Value"/>
<input id="golden" placeholder="Golden Value"/>
<input id="rainbow" placeholder="Rainbow Value"/>

<select id="rarity">
<option value="Secret">Secret</option>
<option value="Mythical">Mythical</option>
</select>

<button onclick="addPet()">Add / Update</button>

</div>

<br>
<button onclick="closeAdmin()">Close</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getAuth,
signInWithEmailAndPassword,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

/* FIREBASE */
const firebaseConfig = {
apiKey: "AIzaSyCD6mwFA3y6xE8pZwLsVWmBKO_VLXTzxxE",
authDomain: "clicker-value-list.firebaseapp.com",
projectId: "clicker-value-list",
storageBucket: "clicker-value-list.firebasestorage.app",
messagingSenderId: "55307390383",
appId: "1:55307390383:web:0cc96c0446b83061cb335a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* SAFE STATE */
window.data = JSON.parse(localStorage.getItem("pets")) || [];
window.isAdmin = false;
window.page = "home";

/* SAFETY CATCH (IMPORTANT) */
window.addEventListener("error", e => {
console.log("JS ERROR:", e.message);
});

/* MENU */
window.toggleMenu = function(){
const m = document.getElementById("menu");
if(!m) return;
m.style.display = m.style.display === "block" ? "none" : "block";
};

window.goPage = function(page){

window.page = page;

document.getElementById("menu").style.display = "none";

document.getElementById("homePage").style.display =
page === "home" ? "block" : "none";

document.getElementById("listPage").style.display =
page !== "home" ? "block" : "none";

render(page);
};

/* RENDER */
function render(page){
let tbody = document.getElementById("tableBody");
if(!tbody) return;

tbody.innerHTML = "";

window.data
.filter(p => p.rarity === page)
.forEach(p => {
tbody.innerHTML += `
<tr>
<td>${p.name}</td>
<td>${p.normal}</td>
<td>${p.golden}</td>
<td>${p.rainbow}</td>
<td>${p.rarity}</td>
</tr>`;
});
}

/* FIXED ADD PET */
window.addPet = function(){

if(!window.isAdmin){
alert("Not admin");
return;
}

const n = document.getElementById("name").value;
const no = document.getElementById("normal").value;
const g = document.getElementById("golden").value;
const r = document.getElementById("rainbow").value;
const ra = document.getElementById("rarity").value;

if(!n || !no){
alert("Fill required fields");
return;
}

let found = window.data.find(p => p.name === n);

if(found){
found.normal = no;
found.golden = g;
found.rainbow = r;
found.rarity = ra;
}else{
window.data.push({name:n,normal:no,golden:g,rainbow:r,rarity:ra});
}

localStorage.setItem("pets", JSON.stringify(window.data));

render(window.page);

alert("Saved!");
};

/* LOGIN SAFE */
window.login = function(){
const e = document.getElementById("email").value;
const p = document.getElementById("password").value;

signInWithEmailAndPassword(auth, e, p)
.catch(err => alert(err.message));
};

/* ADMIN CHECK */
onAuthStateChanged(auth,(user)=>{

window.isAdmin = false;

if(user){
window.isAdmin = true;
document.getElementById("adminTools").style.display = "block";
}else{
document.getElementById("adminTools").style.display = "none";
}

});

/* ADMIN UI */
window.openAdmin = function(){
document.getElementById("adminPanel").style.display = "block";
};

window.closeAdmin = function(){
document.getElementById("adminPanel").style.display = "none";
};

/* START */
goPage("home");

</script>

</body>
</html>
