<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Clicker Value List</title>

<style>
*,*::before,*::after{box-sizing:border-box;}
body{
margin:0;
font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
background:#070a18;
color:#e2e8f0;
line-height:1.5;
-webkit-font-smoothing:antialiased;
}

/* HEADER / NAV */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 6%;
background:linear-gradient(180deg,#111827 0%,#0f172a 100%);
position:sticky;
top:0;
z-index:10;
border-bottom:1px solid rgba(139,92,246,.15);
gap:12px;
}

.logo{
color:#c084fc;
font-weight:700;
font-size:18px;
white-space:nowrap;
letter-spacing:-0.3px;
}

button{
background:#7c3aed;
color:white;
border:none;
padding:9px 16px;
border-radius:8px;
cursor:pointer;
font-size:13px;
font-weight:500;
transition:background .15s,transform .1s,box-shadow .15s;
}
button:hover{background:#6d28d9;box-shadow:0 2px 8px rgba(124,58,237,.3);}
button:active{transform:scale(.97);}

#menu{
display:none;
position:absolute;
right:0;
top:calc(100% + 6px);
background:#1e293b;
border:1px solid #334155;
border-radius:10px;
overflow:hidden;
z-index:999;
min-width:170px;
box-shadow:0 8px 24px rgba(0,0,0,.4);
}
#menu button{
width:100%;
padding:11px 16px;
background:none;
border:none;
color:#cbd5e1;
text-align:left;
font-size:13px;
border-radius:0;
transition:background .12s,color .12s;
}
#menu button:hover{background:#334155;color:white;box-shadow:none;transform:none;}

section{padding:24px 6%;max-width:1200px;margin:0 auto;}

/* ADMIN PANEL */
#adminPanel{
display:none;
position:fixed;
top:0;
right:0;
width:340px;
height:100%;
background:#0f172a;
padding:24px 20px;
border-left:1px solid rgba(139,92,246,.2);
overflow:auto;
z-index:100;
box-shadow:-4px 0 20px rgba(0,0,0,.3);
}
#adminPanel h3{color:#c084fc;margin-top:0;}

input, select{
width:100%;
padding:10px 12px;
margin-top:10px;
border-radius:8px;
border:1px solid #334155;
background:#111827;
color:white;
font-size:13px;
transition:border-color .15s;
outline:none;
}
input:focus,select:focus{border-color:#7c3aed;}
input::placeholder{color:#4b5563;}

/* TABLES */
table{
width:100%;
margin-top:16px;
border-collapse:collapse;
background:#111827;
border-radius:12px;
overflow:hidden;
border:1px solid #1e293b;
table-layout:auto;
}
#petTable td:first-child,#petTable th:first-child,
#searchTable td:first-child,#searchTable th:first-child{width:1%;white-space:nowrap;}
th,td{
padding:12px 14px;
border-bottom:1px solid rgba(255,255,255,0.05);
font-size:13px;
}
th{
color:#a78bfa;
background:#0f172a;
font-size:11px;
text-transform:uppercase;
letter-spacing:.8px;
font-weight:600;
}
#petTable tbody tr,#searchTable tbody tr{transition:background .12s;}
#petTable tbody tr:nth-child(odd),#searchTable tbody tr:nth-child(odd){background:#0c1222;}
#petTable tbody tr:nth-child(even),#searchTable tbody tr:nth-child(even){background:#111827;}
#petTable tbody tr:hover,#searchTable tbody tr:hover{background:#1e293b;}

.delete-btn{
background:#dc2626;
padding:6px 12px;
font-size:11px;
border-radius:6px;
font-weight:500;
}
.delete-btn:hover{background:#ef4444;}

.loading{color:#8b5cf6;text-align:center;padding:40px 20px;font-size:14px;}

/* SEARCH */
#searchBar{
width:100%;
padding:14px 18px;
border-radius:10px;
border:1px solid #334155;
background:#111827;
color:white;
font-size:15px;
outline:none;
margin-top:0;
transition:border-color .15s,box-shadow .15s;
}
#searchBar:focus{border-color:#7c3aed;box-shadow:0 0 0 3px rgba(124,58,237,.15);}
#searchBar::placeholder{color:#4b5563;}
.no-results{color:#6b7280;text-align:center;padding:40px 20px;font-size:14px;}

/* AUTOCOMPLETE */
.name-wrap{position:relative;}
#nameSuggestions{
position:absolute;
top:100%;
left:0;
right:0;
background:#1e293b;
border:1px solid #334155;
border-radius:0 0 8px 8px;
max-height:180px;
overflow-y:auto;
z-index:200;
display:none;
box-shadow:0 4px 12px rgba(0,0,0,.3);
}
#nameSuggestions div{
padding:10px 14px;
cursor:pointer;
font-size:13px;
transition:background .1s;
}
#nameSuggestions div:hover{background:#334155;}

.seed-btn{
background:#0d9488;
margin-top:10px;
font-size:11px;
padding:8px 14px;
}
.seed-btn:hover{background:#14b8a6;}

/* INFO BUTTON */
.info-btn{
background:none;
border:1px solid rgba(139,92,246,.3);
color:#a5b4fc;
width:22px;
height:22px;
border-radius:50%;
font-size:11px;
padding:0;
margin-left:6px;
cursor:pointer;
vertical-align:middle;
line-height:20px;
display:inline-block;
text-align:center;
transition:all .15s;
}
.info-btn:hover{border-color:#a5b4fc;background:rgba(165,180,252,.12);}

/* INFO POPUP */
.info-popup{
position:fixed;
top:0;left:0;right:0;bottom:0;
background:rgba(0,0,0,.65);
backdrop-filter:blur(4px);
z-index:500;
display:flex;
align-items:center;
justify-content:center;
}
.info-bubble{
background:#1e293b;
border:1px solid #334155;
border-radius:14px;
padding:24px 28px;
max-width:420px;
width:90%;
position:relative;
box-shadow:0 12px 40px rgba(0,0,0,.4);
}
.info-bubble h3{
margin:0 0 10px;
color:#c084fc;
font-size:17px;
}
.info-bubble .info-status{
display:inline-block;
padding:4px 12px;
border-radius:20px;
font-size:11px;
font-weight:600;
margin-bottom:10px;
}
.info-status.obtainable{background:#065f46;color:#6ee7b7;}
.info-status.unobtainable{background:#7f1d1d;color:#fca5a5;}
.info-status.limited{background:#78350f;color:#fcd34d;}
.info-status.leaderboard{background:#312e81;color:#a5b4fc;}
.info-status.robux{background:#4c1d95;color:#c4b5fd;}
.info-bubble p{
margin:8px 0 0;
font-size:13px;
color:#94a3b8;
line-height:1.6;
}
.info-bubble .info-close{
position:absolute;
top:12px;right:16px;
background:none;border:none;
color:#6b7280;font-size:20px;
cursor:pointer;padding:0;
transition:color .12s;
}
.info-bubble .info-close:hover{color:white;}

/* VALUE COLUMNS */
#petTable td:nth-child(2),#petTable td:nth-child(3),#petTable td:nth-child(4),#petTable td:nth-child(5),
#searchTable td:nth-child(2),#searchTable td:nth-child(3),#searchTable td:nth-child(4),#searchTable td:nth-child(5){text-align:center;font-weight:500;}

/* PET LINKS */
.pet-link{cursor:pointer;color:#c084fc;transition:color .15s;font-weight:500;}
.pet-link:hover{text-decoration:underline;color:#a78bfa;}
.row-icon{width:24px;height:24px;object-fit:contain;vertical-align:middle;margin-right:6px;display:none;}

/* PET DETAIL PAGE */
.pet-header{display:flex;gap:24px;align-items:flex-start;margin-bottom:28px;flex-wrap:wrap;}
.pet-icon-wrap{
width:160px;height:160px;border-radius:14px;
background:linear-gradient(135deg,#1e293b,#0f172a);
border:2px solid #334155;overflow:hidden;flex-shrink:0;
display:flex;align-items:center;justify-content:center;
}
.pet-icon-wrap img{width:100%;height:100%;object-fit:contain;}
.pet-meta h2{margin:0 0 10px;color:#c084fc;font-size:22px;}
.pet-meta p{margin:5px 0;color:#94a3b8;font-size:14px;}

.pet-values{display:flex;gap:14px;flex-wrap:wrap;margin:20px 0;}
.pet-val-card{
background:linear-gradient(135deg,#1e293b,#172033);
border:1px solid #334155;
border-radius:12px;padding:16px 24px;text-align:center;flex:1;min-width:100px;
}
.pet-val-card .val-label{font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:.5px;}
.pet-val-card .val-num{font-size:22px;font-weight:700;color:white;margin-top:6px;}

/* CALCULATOR */
.calc-section{
background:#111827;
border:1px solid #1e293b;
border-radius:14px;padding:24px;margin-top:24px;
}
.calc-section h3{color:#c084fc;margin:0 0 18px;font-size:16px;font-weight:600;}
.calc-row{margin-bottom:16px;}
.calc-row > label{display:block;color:#94a3b8;font-size:13px;margin-bottom:6px;}
.calc-slider{width:100%;accent-color:#7c3aed;height:6px;}
.calc-checks{display:flex;flex-wrap:wrap;gap:12px;}
.calc-checks label{display:flex;align-items:center;gap:6px;color:#cbd5e1;font-size:13px;cursor:pointer;}
.calc-checks input[type="radio"],.calc-checks input[type="checkbox"]{accent-color:#7c3aed;}

.calc-results{display:flex;gap:14px;flex-wrap:wrap;margin-top:20px;}
.stat-card{
background:#0f172a;border:1px solid #1e293b;
border-radius:10px;padding:14px 20px;text-align:center;flex:1;min-width:80px;
}
.stat-card .stat-label{font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:.5px;}
.stat-card .stat-num{font-size:20px;font-weight:700;color:#a5b4fc;margin-top:4px;}

.back-btn{
background:none;border:1px solid #334155;color:#94a3b8;
padding:8px 18px;border-radius:8px;cursor:pointer;margin-bottom:18px;
font-size:13px;transition:all .15s;
}
.back-btn:hover{border-color:#7c3aed;color:white;background:rgba(124,58,237,.08);}

/* ICON EFFECTS */
@keyframes rainbowHue{from{filter:hue-rotate(0deg);}to{filter:hue-rotate(360deg);}}
@keyframes shinyPulse{0%,100%{box-shadow:0 0 8px 2px rgba(255,215,0,.3);}50%{box-shadow:0 0 20px 6px rgba(255,215,0,.6);}}
.icon-rainbow{animation:rainbowHue 2s linear infinite;}

/* HOME PAGE EDITOR */
#homeEditBtn{
background:rgba(124,58,237,.15);
color:#c084fc;
border:1px solid rgba(139,92,246,.3);
padding:8px 18px;
font-size:13px;
border-radius:8px;
margin-bottom:14px;
}
#homeEditBtn:hover{background:rgba(124,58,237,.25);box-shadow:none;}

#editorToolbar{
display:none;
position:sticky;
top:58px;
z-index:20;
background:#1e293b;
border:1px solid #334155;
border-radius:12px;
padding:12px 16px;
margin-bottom:18px;
flex-wrap:wrap;
gap:6px;
align-items:center;
box-shadow:0 4px 16px rgba(0,0,0,.3);
}
.tb{
background:#334155;
color:white;
border:none;
padding:7px 11px;
border-radius:6px;
cursor:pointer;
font-size:13px;
min-width:30px;
transition:background .12s;
}
.tb:hover{background:#7c3aed;}
.tb-select{
background:#334155;
color:white;
border:none;
padding:7px 10px;
border-radius:6px;
font-size:12px;
cursor:pointer;
}
.tb-color{
width:30px;height:30px;
border:2px solid #334155;border-radius:6px;
cursor:pointer;
background:none;
padding:0;
}
.tb-sep{
width:1px;
height:24px;
background:#4b5563;
margin:0 6px;
display:inline-block;
vertical-align:middle;
}
.tb-save{background:#059669;color:white;border:none;padding:7px 18px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;transition:background .12s;}
.tb-save:hover{background:#10b981;}
.tb-cancel{background:#dc2626;color:white;border:none;padding:7px 18px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;transition:background .12s;}
.tb-cancel:hover{background:#ef4444;}

.editable-block[contenteditable="true"]{
border:2px dashed #4b5563;
border-radius:10px;
padding:14px;
min-height:44px;
outline:none;
transition:border-color .2s,box-shadow .2s;
}
.editable-block[contenteditable="true"]:focus{border-color:#7c3aed;box-shadow:0 0 0 3px rgba(124,58,237,.12);}
.editable-block[contenteditable="true"]:empty::before{
content:attr(data-placeholder);
color:#4b5563;
font-style:italic;
pointer-events:none;
}
.block-label{
display:none;
font-size:10px;
color:#7c3aed;
text-transform:uppercase;
letter-spacing:1.2px;
margin:14px 0 4px;
font-weight:700;
}
.editing .block-label{display:block;}

#homeContent h1,#homeContent h2,#homeContent h3{color:#c084fc;margin:8px 0;}
#homeContent p{color:#94a3b8;margin:6px 0;line-height:1.7;}
#homeContent hr{border:none;border-top:1px solid #334155;margin:14px 0;}
#homeContent ul,#homeContent ol{color:#94a3b8;padding-left:22px;}
#homeContent li{margin:4px 0;}

/* FOOTER */
.site-footer{
text-align:center;
padding:28px 6%;
color:#334155;
font-size:12px;
border-top:1px solid #1e293b;
margin-top:40px;
}

/* SCROLLBAR */
::-webkit-scrollbar{width:8px;}
::-webkit-scrollbar-track{background:#0f172a;}
::-webkit-scrollbar-thumb{background:#334155;border-radius:4px;}
::-webkit-scrollbar-thumb:hover{background:#475569;}

/* SORTABLE HEADERS */
.sortable{cursor:pointer;user-select:none;-webkit-user-select:none;position:relative;white-space:nowrap;}
.sortable:hover{color:#c084fc;background:#1a1f35;}
.sort-arrow{margin-left:4px;font-size:10px;opacity:.5;}
.sortable.sort-active .sort-arrow{opacity:1;color:#c084fc;}
.sortable.sort-active{background:rgba(124,58,237,.1);}

/* TABLE ROW COUNT */
.row-count{font-size:12px;color:#6b7280;padding:4px 0 0;margin:0;}

/* NO RESULTS CARD */
.no-results{
color:#6b7280;text-align:center;padding:40px 20px;font-size:14px;
background:#111827;border:1px solid #1e293b;border-radius:12px;margin-top:14px;
}

/* SEARCH HINT */
.search-hint{color:#4b5563;text-align:center;padding:48px 20px;font-size:14px;font-style:italic;}

/* SCROLL TO TOP */
#scrollTopBtn{
position:fixed;bottom:24px;right:24px;z-index:90;
width:40px;height:40px;border-radius:50%;
background:#7c3aed;color:white;border:none;
font-size:18px;cursor:pointer;
box-shadow:0 4px 12px rgba(124,58,237,.4);
opacity:0;pointer-events:none;
transition:opacity .2s,transform .1s;
}
#scrollTopBtn.visible{opacity:1;pointer-events:auto;}
#scrollTopBtn:hover{background:#6d28d9;transform:scale(1.05);}

/* ICON PLACEHOLDER */
.pet-icon-wrap.loading-icon{
background:linear-gradient(135deg,#1e293b,#0f172a);
animation:iconPulse 1.5s ease-in-out infinite;
}
@keyframes iconPulse{0%,100%{opacity:.6;}50%{opacity:1;}}

/* MOBILE */
@media(max-width:768px){
header{padding:10px 4%;gap:8px;}
header>div{margin:0 8px !important;}
section{padding:16px 4%;}
#adminPanel{width:100%;border-left:none;border-top:2px solid rgba(139,92,246,.3);}
.pet-header{flex-direction:column;align-items:center;text-align:center;}
.pet-icon-wrap{width:120px;height:120px;}
.pet-values{flex-direction:column;}
.pet-val-card{min-width:unset;}
table{font-size:12px;}
th,td{padding:8px 6px;}
#editorToolbar{position:relative;top:0;}
.calc-section{padding:16px;}
.calc-checks{flex-direction:column;gap:6px;}
.stat-card{min-width:60px;padding:10px;}
}
@media(max-width:480px){
header{padding:8px 3%;}
.logo{font-size:15px;}
section{padding:12px 3%;}
#headerSearch{display:none;}
table{font-size:11px;}
th{font-size:10px;padding:8px 4px;}
td{padding:8px 4px;}
.pet-icon-wrap{width:100px;height:100px;}
.pet-meta h2{font-size:18px;}
.info-bubble{padding:18px 20px;max-width:92%;}
.pet-val-card{padding:12px 16px;}
.pet-val-card .val-num{font-size:18px;}
.calc-results{flex-direction:column;}
}
</style>
</head>

<body>

<header>
<div class="logo">🐾 Value List</div>

<div style="display:flex;align-items:center;gap:10px;flex:1;margin:0 16px;">
<div style="position:relative;">
<button onclick="toggleMenu()">Menu ▾</button>
<div id="menu">
<button onclick="goPage('home')">🏠 Home</button>
<button onclick="goPage('search')">🔍 Search</button>
<button onclick="goPage('Basic')">Basic</button>
<button onclick="goPage('Rare')">Rare</button>
<button onclick="goPage('Epic')">Epic</button>
<button onclick="goPage('Legendary')">Legendary</button>
<button onclick="goPage('Mythical')">Mythical</button>
<button onclick="goPage('Special')">Special</button>
<button onclick="goPage('Secret')">Secret</button>
<button onclick="goPage('Mega')">Mega</button>
<button onclick="goPage('Exclusive')">Exclusive</button>
</div>
</div>
<input type="text" id="headerSearch" placeholder="Quick search..." style="width:200px;margin:0;font-size:13px;">
</div>

<button onclick="openAdmin()" style="background:rgba(124,58,237,.15);color:#c084fc;border:1px solid rgba(139,92,246,.3);font-size:12px;padding:8px 14px;">Admin</button>
</header>

<section id="homePage">
<button id="homeEditBtn" onclick="toggleHomeEdit()" style="display:none;">Edit Page</button>
<div id="editorToolbar">
<button class="tb" onclick="execFmt('bold')"><b>B</b></button>
<button class="tb" onclick="execFmt('italic')"><i>I</i></button>
<button class="tb" onclick="execFmt('underline')"><u>U</u></button>
<button class="tb" onclick="execFmt('strikeThrough')"><s>S</s></button>
<span class="tb-sep"></span>
<select class="tb-select" onchange="execFmt('fontName',this.value);this.selectedIndex=0;">
<option value="">Font</option>
<option value="Arial">Arial</option>
<option value="Georgia">Georgia</option>
<option value="Times New Roman">Times New Roman</option>
<option value="Courier New">Courier New</option>
<option value="Verdana">Verdana</option>
<option value="Trebuchet MS">Trebuchet MS</option>
<option value="Impact">Impact</option>
<option value="Comic Sans MS">Comic Sans MS</option>
</select>
<select class="tb-select" onchange="execFmt('fontSize',this.value);this.selectedIndex=0;">
<option value="">Size</option>
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
<option value="4">4</option>
<option value="5">5</option>
<option value="6">6</option>
<option value="7">7</option>
</select>
<input type="color" class="tb-color" value="#ffffff" onchange="execFmt('foreColor',this.value)" title="Text Color">
<select class="tb-select" onchange="execFmt('formatBlock',this.value);this.selectedIndex=0;">
<option value="">Heading</option>
<option value="h1">H1</option>
<option value="h2">H2</option>
<option value="h3">H3</option>
<option value="p">Paragraph</option>
</select>
<span class="tb-sep"></span>
<button class="tb" onclick="execFmt('justifyLeft')" title="Align Left">&#8676;</button>
<button class="tb" onclick="execFmt('justifyCenter')" title="Align Center">&#8596;</button>
<button class="tb" onclick="execFmt('justifyRight')" title="Align Right">&#8677;</button>
<span class="tb-sep"></span>
<button class="tb" onclick="execFmt('insertUnorderedList')" title="Bullet List">&#8226;</button>
<button class="tb" onclick="execFmt('insertOrderedList')" title="Numbered List">1.</button>
<button class="tb" onclick="execFmt('insertHorizontalRule')" title="Horizontal Rule">&#8213;</button>
<span class="tb-sep"></span>
<button class="tb-save" onclick="saveHomePage()">Save</button>
<button class="tb-cancel" onclick="cancelHomeEdit()">Cancel</button>
</div>
<div id="homeContent">
<label class="block-label">Header</label>
<div id="homeHeader" class="editable-block" data-placeholder="Page Header"><h2>Clicker Sim Value List</h2></div>
<label class="block-label">Message of the Day</label>
<div id="homeMotd" class="editable-block" data-placeholder="Message of the Day"></div>
<label class="block-label">Description</label>
<div id="homeDesc" class="editable-block" data-placeholder="Description"><p>Official value list for trading.</p></div>
<label class="block-label">Custom Content</label>
<div id="homeCustom" class="editable-block" data-placeholder="Custom Content"></div>
</div>
</section>

<section id="searchPage" style="display:none;">
<input type="text" id="searchBar" placeholder="Search for any pet by name...">
<p class="search-hint" id="searchHint">Start typing to search for pets...</p>
<p class="row-count" id="searchCount" style="display:none;"></p>
<div style="overflow-x:auto;">
<table id="searchTable" style="display:none;margin-top:14px;">
<thead>
<tr>
<th class="sortable" data-sort="name">Pet <span class="sort-arrow">⇅</span></th>
<th class="sortable" data-sort="normal">Normal <span class="sort-arrow">⇅</span></th>
<th class="sortable" data-sort="golden">Golden <span class="sort-arrow">⇅</span></th>
<th class="sortable" data-sort="rainbow">Rainbow <span class="sort-arrow">⇅</span></th>
<th class="sortable" data-sort="demand">Demand <span class="sort-arrow">⇅</span></th>
</tr>
</thead>
<tbody id="searchBody"></tbody>
</table>
</div>
<p class="no-results" id="noResults" style="display:none;">No pets found.</p>
</section>

<section id="listPage" style="display:none;">
<p class="loading" id="loadingMsg">Loading pets...</p>
<p class="row-count" id="listCount" style="display:none;"></p>
<div style="overflow-x:auto;">
<table id="petTable" style="display:none;">
<thead>
<tr>

/* ICON LOADING */
const iconCache = new Map();
let iconLoadId = 0;
async function loadIcon(assetId, imgEl) {
if (!assetId) { imgEl.style.display = "none"; return; }
if (iconCache.has(assetId)) { imgEl.src = iconCache.get(assetId); imgEl.style.display = "block"; return; }
const myId = ++iconLoadId;
imgEl.dataset.loadId = myId;
try {
const res = await fetch(`https://devilish-keys.devilish-codes.workers.dev/api/thumbnails?ids=${assetId}`);
const j = await res.json();
if (String(imgEl.dataset.loadId) !== String(myId)) return;
const url = j.data && j.data[0] && j.data[0].imageUrl;
if (url) { iconCache.set(assetId, url); imgEl.src = url; imgEl.style.display = "block"; }
else { imgEl.style.display = "none"; }
} catch(e) { if (String(imgEl.dataset.loadId) === String(myId)) imgEl.style.display = "none"; }
}

function loadRowIcons(container) {
container.querySelectorAll(".row-icon[data-asset]").forEach(img => {
const id = img.dataset.asset;
if (id) loadIcon(id, img);
});
}

/* STAT CALCULATOR */
function calcStats(petName, level, variant, shiny, mutations) {
const base = PET_STATS[petName];
if (!base) return null;
const levelMult = 1 + (level / 50) * 0.5;
const variantMult = {Normal:1,Golden:2,Rainbow:4}[variant];
const shinyMult = shiny ? 1.25 : 1;
let mutMult = 1;
if (mutations.Wet) mutMult *= 1.25;
if (mutations.Bloodmoon) mutMult *= 1.4;
if (mutations.Thunderstorm) mutMult *= 1.4;
if (mutations.UpsideDown) mutMult *= 1.4;
const total = levelMult * variantMult * shinyMult * mutMult;
return {
Clicks: base.Clicks ? Math.floor(base.Clicks * total) : 0,
Shells: base.Shells ? Math.floor(base.Shells * total) : 0,
Gems: base.Gems ? Math.floor(base.Gems * total) : 0,
multiplier: total
};
}

function formatNum(n) {
if (n >= 1e12) return (n/1e12).toFixed(1) + "T";
if (n >= 1e9) return (n/1e9).toFixed(1) + "B";
if (n >= 1e6) return (n/1e6).toFixed(1) + "M";
if (n >= 1e3) return (n/1e3).toFixed(1) + "K";
return n.toLocaleString();
}

function updateCalcResults(petName) {
const level = parseInt(document.getElementById("levelSlider").value);
const variant = document.querySelector('input[name="variant"]:checked').value;
const shiny = document.getElementById("shinyCheck").checked;
const mutations = {};
document.querySelectorAll(".mut-check").forEach(c => { mutations[c.value] = c.checked; });

const result = calcStats(petName, level, variant, shiny, mutations);
if (!result) {
document.getElementById("calcResults").innerHTML = '<p style="color:#6b7280;">No stat data available.</p>';
document.getElementById("multBreakdown").textContent = "";
return;
}

const stats = PET_STATS[petName];
let html = "";
if (stats.Clicks) html += `<div class="stat-card"><div class="stat-label">Clicks</div><div class="stat-num">${formatNum(result.Clicks)}</div></div>`;
if (stats.Shells) html += `<div class="stat-card"><div class="stat-label">Shells</div><div class="stat-num">${formatNum(result.Shells)}</div></div>`;
if (stats.Gems) html += `<div class="stat-card"><div class="stat-label">Gems</div><div class="stat-num">${formatNum(result.Gems)}</div></div>`;
document.getElementById("calcResults").innerHTML = html;

const lm = (1 + (level/50)*0.5).toFixed(2);
const vm = {Normal:1,Golden:2,Rainbow:4}[variant];
const sm = shiny ? 1.25 : 1;
const activeMuts = Object.entries(mutations).filter(([,v])=>v).map(([k])=>k);
document.getElementById("multBreakdown").textContent =
`Total: ${result.multiplier.toFixed(2)}\u00d7 (Level ${lm}\u00d7 \u00b7 Variant ${vm}\u00d7 \u00b7 Shiny ${sm}\u00d7 \u00b7 Muts: ${activeMuts.join(", ")||"none"})`;

updateIconEffects(petName, variant, shiny, mutations);
}

function updateIconEffects(petName, variant, shiny, mutations) {
const icons = PET_ICONS[petName];
const img = document.getElementById("petIcon");
const wrap = document.getElementById("petIconWrap");
if (!icons || !img) return;

let assetId = icons.normal;
if (variant === "Golden" && icons.golden) assetId = icons.golden;

if (assetId && assetId !== img.dataset.assetId) {
img.dataset.assetId = assetId;
loadIcon(assetId, img);
}

let filters = [];
if (variant === "Golden" && !icons.golden) filters.push("sepia(1) saturate(3) brightness(1.1) hue-rotate(15deg)");
if (mutations.Wet) filters.push("saturate(1.3) hue-rotate(20deg)");
if (mutations.Bloodmoon) filters.push("saturate(1.5) hue-rotate(-15deg)");
if (mutations.Thunderstorm) filters.push("brightness(1.2) contrast(1.1)");

img.classList.toggle("icon-rainbow", variant === "Rainbow");
img.style.filter = variant === "Rainbow" ? "" : (filters.length ? filters.join(" ") : "");
img.style.transform = mutations.UpsideDown ? "scaleY(-1)" : "";
wrap.style.animation = shiny ? "shinyPulse 1.5s ease-in-out infinite" : "";
}

window.seedPets = async function() {
if (!window.isAdmin) { alert("Not admin"); return; }
if (!confirm("Seed all 184 pets with '?' values? Existing pets will NOT be overwritten.")) return;

const existing = new Set(window.data.map(p => p.name.toLowerCase().replace(/[^a-z0-9]/g, "_")));
let added = 0;

const batch = writeBatch(db);
for (const pet of ALL_PETS) {
const docId = pet.name.toLowerCase().replace(/[^a-z0-9]/g, "_");
if (existing.has(docId)) continue;
const isLow = ["Basic","Rare","Epic","Legendary"].includes(pet.rarity);
batch.set(doc(db, "pets", docId), {
name: pet.name, rarity: pet.rarity,
normal: isLow ? "0" : "?", golden: isLow ? "0" : "?", rainbow: isLow ? "0" : "?",
demand: isLow ? "No Demand" : "?"
});
added++;
}

if (added === 0) { alert("All pets already exist."); return; }

try {
await batch.commit();
await loadPets();
alert("Seeded " + added + " pets!");
} catch (err) {
alert("Seed failed: " + err.message);
}
};

/* SORT STATE */
window.sortKey = null;
window.sortDir = 0;

function parseVal(str) {
  if (!str || str === "?") return 0;
  const n = String(str).replace(/[^0-9.]/g, "");
  return parseFloat(n) || 0;
}

const DEMAND_RANK = {"No Demand":0,"Low":1,"Medium":2,"High":3,"Super High":4};
function demandRankVal(d) { return DEMAND_RANK[d] ?? -1; }

function sortPets(arr) {
  if (!window.sortKey || window.sortDir === 0) return arr;
  const k = window.sortKey, d = window.sortDir;
  return arr.slice().sort((a, b) => {
    let cmp;
    if (k === "name") cmp = (a.name || "").localeCompare(b.name || "");
    else if (k === "demand") cmp = demandRankVal(a.demand) - demandRankVal(b.demand);
    else cmp = parseVal(a[k]) - parseVal(b[k]);
    return cmp * d;
  });
}

function updateSortArrows() {
  document.querySelectorAll(".sortable").forEach(th => {
    const arrow = th.querySelector(".sort-arrow");
    if (th.dataset.sort === window.sortKey && window.sortDir !== 0) {
      th.classList.add("sort-active");
      arrow.textContent = window.sortDir === 1 ? "▲" : "▼";
    } else {
      th.classList.remove("sort-active");
      arrow.textContent = "⇅";
    }
  });
}

function cycleSortCol(key) {
  if (window.sortKey === key) {
    window.sortDir = window.sortDir === 1 ? -1 : window.sortDir === -1 ? 0 : 1;
    if (window.sortDir === 0) window.sortKey = null;
  } else {
    window.sortKey = key;
    window.sortDir = 1;
  }
  updateSortArrows();
  if (window.page === "search") renderSearch(document.getElementById("searchBar").value);
  else if (window.page !== "home" && window.page !== "pet") render(window.page);
}

document.querySelectorAll(".sortable").forEach(th => {
  th.addEventListener("click", () => cycleSortCol(th.dataset.sort));
});

document.getElementById("golden").value = "";
document.getElementById("rainbow").value = "";
document.getElementById("demand").value = "?";
alert("Saved!");
} catch (err) {
alert("Save failed: " + err.message);
}
};

/* DELETE PET */
async function deletePet(id) {
if (!window.isAdmin) return;
if (!confirm("Delete this pet?")) return;
try {
await deleteDoc(doc(db, "pets", id));
await loadPets();
} catch (err) {
alert("Delete failed: " + err.message);
}
}

/* NAME AUTOCOMPLETE */
const nameInput = document.getElementById("name");
const suggestions = document.getElementById("nameSuggestions");

nameInput.addEventListener("input", () => {
const q = nameInput.value.trim().toLowerCase();
suggestions.innerHTML = "";
if (!q) { suggestions.style.display = "none"; return; }

const matches = window.data.filter(p => p.name.toLowerCase().includes(q)).slice(0, 8);
if (!matches.length) { suggestions.style.display = "none"; return; }

suggestions.style.display = "block";
matches.forEach(p => {
const div = document.createElement("div");
div.textContent = p.name + " (" + p.rarity + ")";
div.addEventListener("click", () => {
nameInput.value = p.name;
document.getElementById("normal").value = p.normal || "";
document.getElementById("golden").value = p.golden || "";
document.getElementById("rainbow").value = p.rainbow || "";
document.getElementById("rarity").value = p.rarity || "Basic";
document.getElementById("demand").value = p.demand || "?";
suggestions.style.display = "none";
});
suggestions.appendChild(div);
});
});

nameInput.addEventListener("blur", () => {
setTimeout(() => { suggestions.style.display = "none"; }, 150);
});

window.openAdmin = function(){

};

window.closeAdmin = function(){

};

/* SEARCH */
function renderSearch(query) {
const tbody = document.getElementById("searchBody");
const table = document.getElementById("searchTable");
const noResults = document.getElementById("noResults");
const hint = document.getElementById("searchHint");
const countEl = document.getElementById("searchCount");
if (!tbody) return;

tbody.innerHTML = "";
const q = query.toLowerCase();
const matches = q ? window.data.filter(p => p.name.toLowerCase().includes(q)) : [];

if (!q) {
table.style.display = "none";
noResults.style.display = "none";
if (hint) hint.style.display = "block";
if (countEl) countEl.style.display = "none";
return;
}

if (hint) hint.style.display = "none";

if (matches.length === 0) {
table.style.display = "none";
noResults.style.display = "block";
if (countEl) countEl.style.display = "none";
return;
}

noResults.style.display = "none";
table.style.display = "table";
if (countEl) { countEl.textContent = `Showing ${matches.length} pet${matches.length !== 1 ? "s" : ""}`; countEl.style.display = "block"; }

sortPets(matches).forEach(p => {
const tr = document.createElement("tr");
tr.innerHTML =
`<td>${petNameCell(p.name)}</td>` +
`<td>${esc(p.normal)}</td>` +
`<td>${esc(p.golden)}</td>` +
`<td>${esc(p.rainbow)}</td>` +
`<td>${demandBadge(p.demand)}</td>`;
tbody.appendChild(tr);
});

bindInfoButtons(tbody);
bindPetLinks(tbody);
loadRowIcons(tbody);
}

let searchTimer = null;
function debouncedSearch(q) {
clearTimeout(searchTimer);
searchTimer = setTimeout(() => renderSearch(q), 200);
}

document.getElementById("searchBar").addEventListener("input", (e) => {
document.getElementById("headerSearch").value = e.target.value;
debouncedSearch(e.target.value);
});

document.getElementById("headerSearch").addEventListener("input", (e) => {
const q = e.target.value;
if (window.page !== "search") {
window.page = "search";
document.getElementById("homePage").style.display = "none";
document.getElementById("listPage").style.display = "none";
document.getElementById("searchPage").style.display = "block";
}
document.getElementById("searchBar").value = q;
debouncedSearch(q);
});

/* CLOSE MENU ON OUTSIDE CLICK */
document.addEventListener("click", (e) => {
const menu = document.getElementById("menu");
if (!e.target.closest("#menu") && !e.target.closest("[onclick*='toggleMenu']")) {
menu.style.display = "none";
}
});

/* HOME PAGE EDITOR */
let _homeSnap = {};

window.execFmt = function(cmd, val) {
document.execCommand(cmd, false, val || null);
};

async function loadHomePage() {
try {
const snap = await getDoc(doc(db, "config", "homepage"));
if (snap.exists()) {
const d = snap.data();
if (d.headerHtml) document.getElementById("homeHeader").innerHTML = d.headerHtml;
if (d.motdHtml) document.getElementById("homeMotd").innerHTML = d.motdHtml;
if (d.descriptionHtml) document.getElementById("homeDesc").innerHTML = d.descriptionHtml;
if (d.customHtml) document.getElementById("homeCustom").innerHTML = d.customHtml;
}
} catch(e) { console.error("loadHomePage:", e); }
}

window.toggleHomeEdit = function() {
const blocks = ["homeHeader","homeMotd","homeDesc","homeCustom"];
blocks.forEach(id => {
_homeSnap[id] = document.getElementById(id).innerHTML;
document.getElementById(id).contentEditable = "true";
});
document.getElementById("editorToolbar").style.display = "flex";
document.getElementById("homeEditBtn").style.display = "none";
document.getElementById("homeContent").classList.add("editing");
};

window.saveHomePage = async function() {
try {
await setDoc(doc(db, "config", "homepage"), {
headerHtml: document.getElementById("homeHeader").innerHTML,
motdHtml: document.getElementById("homeMotd").innerHTML,
descriptionHtml: document.getElementById("homeDesc").innerHTML,
customHtml: document.getElementById("homeCustom").innerHTML,
updatedAt: new Date().toISOString()
});
} catch(e) { alert("Save failed: " + e.message); return; }
exitEditMode();
};

window.cancelHomeEdit = function() {
const blocks = ["homeHeader","homeMotd","homeDesc","homeCustom"];
blocks.forEach(id => {
document.getElementById(id).innerHTML = _homeSnap[id] || "";
});
exitEditMode();
};

function exitEditMode() {
const blocks = ["homeHeader","homeMotd","homeDesc","homeCustom"];
blocks.forEach(id => {
document.getElementById(id).contentEditable = "false";
});
document.getElementById("editorToolbar").style.display = "none";
document.getElementById("homeContent").classList.remove("editing");
if (window.isAdmin && window.page === "home") {
document.getElementById("homeEditBtn").style.display = "inline-block";
}
}

/* SCROLL TO TOP */
const scrollBtn = document.getElementById("scrollTopBtn");
window.addEventListener("scroll", () => {
scrollBtn.classList.toggle("visible", window.scrollY > 200);
});
scrollBtn.addEventListener("click", () => {
window.scrollTo({ top: 0, behavior: "smooth" });
});

/* START */
goPage("home");
loadPets();
loadHomePage();

</script>
