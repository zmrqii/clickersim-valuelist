<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Clicker Value List</title>

<style>
body{
margin:0;
font-family:Arial;
background:#070a18;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 8%;
background:#111827;
position:sticky;
top:0;
z-index:10;
}

.logo{color:#c084fc;font-weight:bold;}

button{
background:#7c3aed;
color:white;
border:none;
padding:10px 14px;
border-radius:8px;
cursor:pointer;
}

#menu{
display:none;
position:absolute;
right:0;
top:45px;
background:#111827;
border:1px solid rgba(255,255,255,0.1);
border-radius:10px;
overflow:hidden;
z-index:999;
min-width:150px;
}

#menu button{
width:100%;
padding:10px;
background:none;
border:none;
color:white;
text-align:left;
}

section{padding:20px 8%;}

#adminPanel{
display:none;
position:fixed;
top:0;
right:0;
width:320px;
height:100%;
background:#0f172a;
padding:20px;
border-left:2px solid #c084fc;
overflow:auto;
z-index:100;
}

input, select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:none;
background:#111827;
color:white;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
background:#111827;
}

th,td{
padding:10px;
border-bottom:1px solid rgba(255,255,255,0.1);
}
th{color:#c084fc;background:#0f172a;}

.delete-btn{
background:#dc2626;
padding:5px 10px;
font-size:12px;
border-radius:4px;
}
.delete-btn:hover{background:#ef4444;}

.loading{color:#8b5cf6;text-align:center;padding:20px;}

#searchBar{
width:100%;
padding:12px 16px;
border-radius:8px;
border:1px solid rgba(255,255,255,0.1);
background:#111827;
color:white;
font-size:14px;
outline:none;
margin-top:0;
}
#searchBar:focus{border-color:#7c3aed;}
#searchBar::placeholder{color:#6b7280;}
.no-results{color:#6b7280;text-align:center;padding:20px;}
</style>
</head>

<body>

<header>
<div class="logo">🐾 Value List</div>

<div style="position:relative;">
<button onclick="toggleMenu()">Menu ▼</button>
<div id="menu">
<button onclick="goPage('home')">Home</button>
<button onclick="goPage('search')">Search</button>
<button onclick="goPage('Basic')">Basic</button>
<button onclick="goPage('Rare')">Rare</button>
<button onclick="goPage('Epic')">Epic</button>
<button onclick="goPage('Legendary')">Legendary</button>
<button onclick="goPage('Mythic')">Mythic</button>
<button onclick="goPage('Mythical')">Mythical</button>
<button onclick="goPage('Special')">Special</button>
<button onclick="goPage('Secret')">Secret</button>
<button onclick="goPage('Mega')">Mega</button>
</div>
</div>

<button onclick="openAdmin()">Admin</button>
</header>

<section id="homePage">
<h2>Clicker Sim Value List</h2>
<p>Official value list for trading.</p>
</section>

<section id="searchPage" style="display:none;">
<input type="text" id="searchBar" placeholder="Search pets...">
<table id="searchTable" style="display:none;margin-top:10px;">
<thead>
<tr>
<th>Pet</th>
<th>Normal</th>
<th>Golden</th>
<th>Rainbow</th>
<th>Rarity</th>
</tr>
</thead>
<tbody id="searchBody"></tbody>
</table>
<p class="no-results" id="noResults" style="display:none;">No pets found.</p>
</section>

<section id="listPage" style="display:none;">
<p class="loading" id="loadingMsg">Loading pets...</p>
<table id="petTable" style="display:none;">
<thead>
<tr>
<th>Pet</th>
<th>Normal</th>
<th>Golden</th>
<th>Rainbow</th>
<th>Rarity</th>
<th id="deleteCol" style="display:none;">Action</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</section>

<div id="adminPanel">

<h3>Admin Login</h3>

<input id="email" placeholder="Email"/>
<input id="password" type="password" placeholder="Password"/>

<button onclick="login()">Login</button>

<hr/>

<div id="adminTools" style="display:none;">

<input id="name" placeholder="Pet Name"/>
<input id="normal" placeholder="Normal Value"/>
<input id="golden" placeholder="Golden Value"/>
<input id="rainbow" placeholder="Rainbow Value"/>

<select id="rarity">
<option value="Basic">Basic</option>
<option value="Rare">Rare</option>
<option value="Epic">Epic</option>
<option value="Legendary">Legendary</option>
<option value="Mythic">Mythic</option>
<option value="Mythical">Mythical</option>
<option value="Special">Special</option>
<option value="Secret">Secret</option>
<option value="Mega">Mega</option>
</select>

<button onclick="addPet()">Add / Update</button>
<button onclick="logout()" style="background:#dc2626;margin-top:10px;">Logout</button>

</div>

<br>
<button onclick="closeAdmin()">Close</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getAuth,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import {
getFirestore,
collection,
doc,
getDocs,
setDoc,
deleteDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
apiKey: "AIzaSyCD6mwFA3y6xE8pZwLsVWmBKO_VLXTzxxE",
authDomain: "clicker-value-list.firebaseapp.com",
projectId: "clicker-value-list",
storageBucket: "clicker-value-list.firebasestorage.app",
messagingSenderId: "55307390383",
appId: "1:55307390383:web:0cc96c0446b83061cb335a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* STATE */
window.data = [];
window.isAdmin = false;
window.page = "home";

/* SAFETY CATCH */
window.addEventListener("error", e => {
console.log("JS ERROR:", e.message);
});

/* XSS PROTECTION */
function esc(str) {
const d = document.createElement("div");
d.textContent = String(str);
return d.innerHTML;
}

/* LOAD PETS FROM FIRESTORE */
async function loadPets() {
try {
const snap = await getDocs(collection(db, "pets"));
window.data = [];
snap.forEach(d => {
window.data.push({ id: d.id, ...d.data() });
});
document.getElementById("loadingMsg").style.display = "none";
document.getElementById("petTable").style.display = "table";
render(window.page);
} catch (err) {
console.log("Firestore load error:", err.message);
document.getElementById("loadingMsg").textContent = "Failed to load pets.";
}
}

/* MENU */
window.toggleMenu = function(){
const m = document.getElementById("menu");
if(!m) return;
m.style.display = m.style.display === "block" ? "none" : "block";
};

window.goPage = function(page){
window.page = page;
document.getElementById("menu").style.display = "none";
document.getElementById("homePage").style.display = page === "home" ? "block" : "none";
document.getElementById("searchPage").style.display = page === "search" ? "block" : "none";
document.getElementById("listPage").style.display = (page !== "home" && page !== "search") ? "block" : "none";
if (page === "search") {
document.getElementById("searchBar").value = "";
renderSearch("");
document.getElementById("searchBar").focus();
} else if (page !== "home") {
render(page);
}
};

/* RENDER */
function render(page){
const tbody = document.getElementById("tableBody");
if(!tbody) return;

tbody.innerHTML = "";

const deleteCol = document.getElementById("deleteCol");
if (deleteCol) deleteCol.style.display = window.isAdmin ? "table-cell" : "none";

window.data
.filter(p => p.rarity === page)
.forEach(p => {
const tr = document.createElement("tr");
tr.innerHTML =
`<td>${esc(p.name)}</td>` +
`<td>${esc(p.normal)}</td>` +
`<td>${esc(p.golden)}</td>` +
`<td>${esc(p.rainbow)}</td>` +
`<td>${esc(p.rarity)}</td>` +
(window.isAdmin ? `<td><button class="delete-btn" data-id="${esc(p.id)}">Delete</button></td>` : "");
tbody.appendChild(tr);
});

tbody.querySelectorAll(".delete-btn").forEach(btn => {
btn.addEventListener("click", () => deletePet(btn.dataset.id));
});
}

/* ADD / UPDATE PET — SAVES TO FIRESTORE */
window.addPet = async function(){
if(!window.isAdmin){
alert("Not admin");
return;
}

const n = document.getElementById("name").value.trim();
const no = document.getElementById("normal").value.trim();
const g = document.getElementById("golden").value.trim();
const r = document.getElementById("rainbow").value.trim();
const ra = document.getElementById("rarity").value;

if(!n || !no){
alert("Fill required fields");
return;
}

const petData = { name: n, normal: no, golden: g, rainbow: r, rarity: ra };
const docId = n.toLowerCase().replace(/[^a-z0-9]/g, "_");

try {
await setDoc(doc(db, "pets", docId), petData);
await loadPets();
document.getElementById("name").value = "";
document.getElementById("normal").value = "";
document.getElementById("golden").value = "";
document.getElementById("rainbow").value = "";
alert("Saved!");
} catch (err) {
alert("Save failed: " + err.message);
}
};

/* DELETE PET */
async function deletePet(id) {
if (!window.isAdmin) return;
if (!confirm("Delete this pet?")) return;
try {
await deleteDoc(doc(db, "pets", id));
await loadPets();
} catch (err) {
alert("Delete failed: " + err.message);
}
}

/* LOGIN */
window.login = function(){
const e = document.getElementById("email").value;
const p = document.getElementById("password").value;
signInWithEmailAndPassword(auth, e, p)
.then(() => {
document.getElementById("email").value = "";
document.getElementById("password").value = "";
})
.catch(err => alert(err.message));
};

/* LOGOUT */
window.logout = function(){
signOut(auth).catch(err => alert(err.message));
};

/* ADMIN CHECK */
onAuthStateChanged(auth, (user) => {
window.isAdmin = !!user;
document.getElementById("adminTools").style.display = user ? "block" : "none";
render(window.page);
});

/* ADMIN UI */
window.openAdmin = function(){
document.getElementById("adminPanel").style.display = "block";
};

window.closeAdmin = function(){
document.getElementById("adminPanel").style.display = "none";
};

/* SEARCH */
function renderSearch(query) {
const tbody = document.getElementById("searchBody");
const table = document.getElementById("searchTable");
const noResults = document.getElementById("noResults");
if (!tbody) return;

tbody.innerHTML = "";
const q = query.toLowerCase();
const matches = q ? window.data.filter(p => p.name.toLowerCase().includes(q)) : [];

if (!q) {
table.style.display = "none";
noResults.style.display = "none";
return;
}

if (matches.length === 0) {
table.style.display = "none";
noResults.style.display = "block";
return;
}

noResults.style.display = "none";
table.style.display = "table";

matches.forEach(p => {
const tr = document.createElement("tr");
tr.innerHTML =
`<td>${esc(p.name)}</td>` +
`<td>${esc(p.normal)}</td>` +
`<td>${esc(p.golden)}</td>` +
`<td>${esc(p.rainbow)}</td>` +
`<td>${esc(p.rarity)}</td>`;
tbody.appendChild(tr);
});
}

document.getElementById("searchBar").addEventListener("input", (e) => {
renderSearch(e.target.value);
});

/* CLOSE MENU ON OUTSIDE CLICK */
document.addEventListener("click", (e) => {
const menu = document.getElementById("menu");
if (!e.target.closest("#menu") && !e.target.closest("[onclick*='toggleMenu']")) {
menu.style.display = "none";
}
});

/* START */
goPage("home");
loadPets();

</script>

</body>
</html>
