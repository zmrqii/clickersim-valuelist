<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Clicker Value List</title>

<style>
body{
margin:0;
font-family:Arial;
background:#070a18;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 8%;
background:#111827;
position:sticky;
top:0;
}

.logo{color:#c084fc;font-weight:bold;}

button{
background:#7c3aed;
color:white;
border:none;
padding:10px 14px;
border-radius:8px;
cursor:pointer;
margin:3px;
}

#menu{
display:none;
position:absolute;
right:0;
top:45px;
background:#111827;
border:1px solid rgba(255,255,255,0.1);
border-radius:10px;
overflow:hidden;
z-index:999;
min-width:150px;
}

#menu button{
width:100%;
padding:10px;
background:none;
border:none;
color:white;
text-align:left;
}

section{padding:20px 8%;}

#adminPanel{
display:none;
position:fixed;
top:0;
right:0;
width:320px;
height:100%;
background:#0f172a;
padding:20px;
border-left:2px solid #c084fc;
overflow:auto;
}

input, select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:none;
background:#111827;
color:white;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
background:#111827;
}

th,td{
padding:10px;
border-bottom:1px solid rgba(255,255,255,0.1);
}
th{color:#c084fc;background:#0f172a;}

.adminPet{
background:#111827;
padding:8px;
border-radius:6px;
margin-top:8px;
}
</style>
</head>

<body>

<header>
<div class="logo">🐾 Value List</div>

<div style="position:relative;">
<button onclick="toggleMenu()">Menu ▼</button>
<div id="menu">
<button onclick="goPage('home')">Home</button>
<button onclick="goPage('Secret')">Secrets</button>
<button onclick="goPage('Mythical')">Mythicals</button>
</div>
</div>

<button onclick="openAdmin()">Admin</button>
</header>

<section id="homePage">
<h2>Clicker Sim Value List</h2>
<p>Official value list for trading.</p>
</section>

<section id="listPage" style="display:none;">
<table>
<thead>
<tr>
<th>Pet</th>
<th>Normal</th>
<th>Golden</th>
<th>Rainbow</th>
<th>Rarity</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</section>

<!-- ADMIN PANEL -->
<div id="adminPanel">

<h3>Admin Login</h3>

<input id="email" placeholder="Email"/>
<input id="password" type="password" placeholder="Password"/>

<button onclick="login()">Login</button>

<hr/>

<div id="adminTools" style="display:none;">

<h4>Add / Update Pet</h4>

<input id="name" placeholder="Pet Name"/>
<input id="normal" placeholder="Normal Value"/>
<input id="golden" placeholder="Golden Value"/>
<input id="rainbow" placeholder="Rainbow Value"/>

<select id="rarity">
<option value="Secret">Secret</option>
<option value="Mythical">Mythical</option>
</select>

<button onclick="addPet()">Add / Update</button>

<hr/>

<h4>Edit / Delete Pets</h4>
<div id="adminList"></div>

</div>

<br>
<button onclick="closeAdmin()">Close</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getAuth,
signInWithEmailAndPassword,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

/* FIREBASE */
const firebaseConfig = {
apiKey: "AIzaSyCD6mwFA3y6xE8pZwLsVWmBKO_VLXTzxxE",
authDomain: "clicker-value-list.firebaseapp.com",
projectId: "clicker-value-list",
storageBucket: "clicker-value-list.firebasestorage.app",
messagingSenderId: "55307390383",
appId: "1:55307390383:web:0cc96c0446b83061cb335a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* STATE */
window.data = JSON.parse(localStorage.getItem("pets")) || [];
window.isAdmin = false;
window.page = "home";

/* SORT VALUE */
function toNumber(v){
if(!v) return 0;
v = v.toUpperCase();
if(v.includes("T")) return parseFloat(v)*1e12;
if(v.includes("B")) return parseFloat(v)*1e9;
if(v.includes("M")) return parseFloat(v)*1e6;
return parseFloat(v)||0;
}

/* MENU */
window.toggleMenu = function(){
const m=document.getElementById("menu");
m.style.display=m.style.display==="block"?"none":"block";
};

window.goPage = function(p){
window.page=p;
document.getElementById("menu").style.display="none";
document.getElementById("homePage").style.display=(p==="home")?"block":"none";
document.getElementById("listPage").style.display=(p==="home")?"none":"block";
render();
};

/* MAIN TABLE */
function render(){
let tbody=document.getElementById("tableBody");
if(!tbody) return;

tbody.innerHTML="";

let sorted=[...window.data].sort((a,b)=>toNumber(b.normal)-toNumber(a.normal));

sorted
.filter(p=>p.rarity===window.page)
.forEach(p=>{
tbody.innerHTML+=`
<tr>
<td>${p.name}</td>
<td>${p.normal}</td>
<td>${p.golden}</td>
<td>${p.rainbow}</td>
<td>${p.rarity}</td>
</tr>`;
});

renderAdminList();
}

/* ADMIN LIST (NEW EDIT/DELETE PANEL) */
function renderAdminList(){
let box=document.getElementById("adminList");
if(!box) return;

box.innerHTML="";

window.data.forEach((p,i)=>{
box.innerHTML+=`
<div class="adminPet">
<b>${p.name}</b><br>
${p.normal} | ${p.rarity}<br>

<button onclick="editPet(${i})">Edit</button>
<button onclick="deletePet(${i})">Delete</button>
</div>
`;
});
}

/* ADD / UPDATE */
window.addPet=function(){

if(!window.isAdmin){
alert("Not admin");
return;
}

let n=name.value;
let no=normal.value;
let g=golden.value;
let r=rainbow.value;
let ra=rarity.value;

let found=window.data.find(p=>p.name===n);

if(found){
found.normal=no;
found.golden=g;
found.rainbow=r;
found.rarity=ra;
}else{
window.data.push({name:n,normal:no,golden:g,rainbow:r,rarity:ra});
}

localStorage.setItem("pets",JSON.stringify(window.data));
render();
};

/* EDIT */
window.editPet=function(i){
let p=window.data[i];
name.value=p.name;
normal.value=p.normal;
golden.value=p.golden;
rainbow.value=p.rainbow;
rarity.value=p.rarity;
};

/* DELETE */
window.deletePet=function(i){
window.data.splice(i,1);
localStorage.setItem("pets",JSON.stringify(window.data));
render();
};

/* LOGIN */
window.login=function(){
let e=email.value;
let p=password.value;

signInWithEmailAndPassword(auth,e,p)
.catch(err=>alert(err.message));
};

/* AUTH */
onAuthStateChanged(auth,user=>{
window.isAdmin=false;

if(user){
window.isAdmin=true;
document.getElementById("adminTools").style.display="block";
}
});

/* ADMIN */
window.openAdmin=function(){
document.getElementById("adminPanel").style.display="block";
};

window.closeAdmin=function(){
document.getElementById("adminPanel").style.display="none";
};

/* START */
render();

</script>

</body>
</html>
